services:
  postgres:
    image: postgres:16-alpine
    container_name: evaluator-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evaluator
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d evaluator']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evaluator-redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: evaluator-garage
    ports:
      - '9000:3900'
      - '3903:3903'
    volumes:
      - ./docker/garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    healthcheck:
      test: ['CMD', '/garage', '-c', '/etc/garage.toml', 'status']
      interval: 5s
      timeout: 10s
      retries: 10

  garage-init:
    image: alpine:3.19
    container_name: evaluator-garage-init
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - ./docker/garage-init.sh:/garage-init.sh:ro
    entrypoint: ['/bin/sh', '/garage-init.sh']
    restart: 'no'

  garage-webui:
    image: khairul169/garage-webui:latest
    container_name: evaluator-garage-webui
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - ./docker/garage.toml:/etc/garage.toml:ro
    ports:
      - '3909:3909'
    environment:
      API_BASE_URL: 'http://garage:3903'
      S3_ENDPOINT_URL: 'http://garage:3900'

volumes:
  postgres_data:
  redis_data:
  garage_data:
