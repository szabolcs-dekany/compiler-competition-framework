id: TC003
category: control_flow
name: If-Else Conditional
description: Read an integer and print whether it is positive, negative, or zero
difficulty: 2
args: []
timeout_ms: 5000
max_memory_mb: 256
points: 15
performance_bonus: true
performance_threshold_ms: 150

generator:
  runs: 5
  seed: deterministic
  inputs:
    - var: n
      type: int
      min: -100
      max: 100
  stdin: "${n}"
  validator: |
    function validate(output, inputs) {
      const n = inputs.n;
      const expected = n > 0 ? 'positive' : n < 0 ? 'negative' : 'zero';
      return output.trim() === expected;
    }
  expected_exit_code: 0
