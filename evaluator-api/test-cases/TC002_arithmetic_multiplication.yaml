id: TC002
category: arithmetic
name: Integer Multiplication
description: Multiply two random integers and print result
difficulty: 2
args: []
timeout_ms: 5000
max_memory_mb: 256
points: 10
performance_bonus: true
performance_threshold_ms: 100

generator:
  runs: 3
  seed: deterministic
  inputs:
    - var: a
      type: int
      min: 1
      max: 100
    - var: b
      type: int
      min: 1
      max: 100
  stdin: "${a} ${b}"
  expected_stdout: "${a * b}"
  expected_exit_code: 0
